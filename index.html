    function App() {
      const [expandedRaceId, setExpandedRaceId] = useState(null);
      
      const [currentCalendarDate, setCurrentCalendarDate] = useState(() => {
        const today = new Date();
        if (today.getFullYear() === 2026) {
          return new Date(2026, today.getMonth(), 1);
        }
        return new Date(2026, 2, 1);
      });

      const sessionDatesMap = useMemo(() => {
        const map = {};
        f1Calendar.forEach(race => {
          const start = new Date(race.startDate);
          const end = new Date(race.endDate);

          race.sessions.forEach(session => {
            if (session.time === '-') return;

            const dayMatch = session.day.match(/\d+/);
            if (!dayMatch) return;
            const dayNum = parseInt(dayMatch[0], 10);

            let sessionDate = new Date(start);
            let curr = new Date(start);
            while (curr <= end) {
              if (curr.getDate() === dayNum) {
                sessionDate = new Date(curr);
                break;
              }
              curr.setDate(curr.getDate() + 1);
            }

            const y = sessionDate.getFullYear();
            const m = String(sessionDate.getMonth() + 1).padStart(2, '0');
            const d = String(sessionDate.getDate()).padStart(2, '0');
            const dateStr = `${y}-${m}-${d}`;

            if (!map[dateStr]) {
              map[dateStr] = { raceId: race.id, types: [] };
            }

            const name = session.name.toLowerCase();
            let type = 'practice';
            if (name.includes('carrera') && !name.includes('sprint')) type = 'race';
            else if (name.includes('clasificación') || name.includes('qualy') && !name.includes('sprint')) type = 'qualy';
            else if (name.includes('sprint')) type = 'sprint';

            map[dateStr].types.push(type);
          });
          
          Object.keys(map).forEach(key => {
            map[key].types = Array.from(new Set(map[key].types));
          });
        });
        return map;
      }, []);

      useEffect(() => {
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        const nextRace = f1Calendar.find(race => {
          const endDate = new Date(race.endDate);
          endDate.setHours(23, 59, 59, 999);
          return endDate >= today;
        });

        if (nextRace) {
          setExpandedRaceId(nextRace.id);
        } else {
          setExpandedRaceId(f1Calendar[0].id);
        }
      }, []);

      const toggleRace = (id) => {
        setExpandedRaceId(prev => prev === id ? null : id);
      };

      const handleDayClick = (raceId) => {
        if (!raceId) return;
        setExpandedRaceId(raceId);
        
        setTimeout(() => {
          const element = document.getElementById(raceId);
          if (element) {
            const headerOffset = 80;
            const elementPosition = element.getBoundingClientRect().top;
            const offsetPosition = elementPosition + window.scrollY - headerOffset;
      
            window.scrollTo({
              top: offsetPosition,
              behavior: 'smooth'
            });
          }
        }, 150);
      };

      const formatDate = (start, end) => {
        const dStart = new Date(start);
        const dEnd = new Date(end);
        const months = ["ENE", "FEB", "MAR", "ABR", "MAY", "JUN", "JUL", "AGO", "SEP", "OCT", "NOV", "DIC"];
        return `${dStart.getDate()}-${dEnd.getDate()} ${months[dStart.getMonth()]}`;
      };

      const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
      const dayNames = ["L", "M", "X", "J", "V", "S", "D"];
      
      const currentYear = currentCalendarDate.getFullYear();
      const currentMonthNum = currentCalendarDate.getMonth();
      
      const firstDayOfMonth = new Date(currentYear, currentMonthNum, 1).getDay();
      const daysInMonth = new Date(currentYear, currentMonthNum + 1, 0).getDate();
      const startOffset = (firstDayOfMonth + 6) % 7;
      
      const calendarCells = [];
      for (let i = 0; i < startOffset; i++) calendarCells.push(null);
      for (let i = 1; i <= daysInMonth; i++) calendarCells.push(i);

      const weeks = [];
      let currentWeek = [];
      calendarCells.forEach(cell => {
        currentWeek.push(cell);
        if (currentWeek.length === 7) {
          weeks.push(currentWeek);
          currentWeek = [];
        }
      });
      if (currentWeek.length > 0) {
        while (currentWeek.length < 7) currentWeek.push(null);
        weeks.push(currentWeek);
      }

      const prevMonth = () => setCurrentCalendarDate(new Date(currentYear, currentMonthNum - 1, 1));
      const nextMonth = () => setCurrentCalendarDate(new Date(currentYear, currentMonthNum + 1, 1));

      return (
        <div className="min-h-screen bg-zinc-950 text-white font-sans selection:bg-red-600 selection:text-white pb-12">
          <header className="bg-zinc-900 border-b-4 border-red-600 sticky top-0 z-50 shadow-xl">
            <div className="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="bg-red-600 text-white font-black italic px-3 py-1 text-xl tracking-tighter transform -skew-x-12">
                  <span className="block transform skew-x-12">F1</span>
                </div>
                <h1 className="font-bold text-xl md:text-2xl uppercase tracking-wide">
                  Calendario 2026
                </h1>
              </div>
              <div className="text-zinc-400 text-xs md:text-sm font-medium flex items-center gap-2">
                <Clock size={14} className="text-red-500" />
                Horarios España (CET)
              </div>
            </div>
          </header>

          <main className="max-w-4xl mx-auto px-4 py-8">
            <div className="bg-zinc-900 border border-zinc-800 rounded-xl p-5 mb-10 shadow-lg">
              <div className="flex items-center justify-between mb-6">
                <button onClick={prevMonth} className="p-2 bg-zinc-800 hover:bg-zinc-700 rounded-full transition-colors text-zinc-300">
                  <ChevronLeft size={20} />
                </button>
                <h2 className="text-lg md:text-xl font-bold uppercase tracking-widest text-center min-w-[180px]">
                  {monthNames[currentMonthNum]} {currentYear}
                </h2>
                <button onClick={nextMonth} className="p-2 bg-zinc-800 hover:bg-zinc-700 rounded-full transition-colors text-zinc-300">
                  <ChevronRight size={20} />
                </button>
              </div>

              <div className="grid grid-cols-8 gap-y-4 gap-x-1 md:gap-x-2">
                {dayNames.map(day => (
                  <div key={day} className="text-center text-zinc-500 text-xs md:text-sm font-bold">
                    {day}
                  </div>
                ))}
                <div className="text-center text-zinc-500 text-xs md:text-sm font-bold">🏁</div>
                
                {weeks.map((week, weekIdx) => {
                  let weekRaceId = null;
                  week.forEach(dayNum => {
                    if (dayNum) {
                      const dateStr = `${currentYear}-${String(currentMonthNum + 1).padStart(2, '0')}-${String(dayNum).padStart(2, '0')}`;
                      if (sessionDatesMap[dateStr]) {
                        weekRaceId = sessionDatesMap[dateStr].raceId;
                      }
                    }
                  });
                  const weekRace = weekRaceId ? f1Calendar.find(r => r.id === weekRaceId) : null;

                  return (
                    <React.Fragment key={`week-${weekIdx}`}>
                      {week.map((dayNum, idx) => {
                        if (!dayNum) return <div key={`empty-${weekIdx}-${idx}`} className="h-10 md:h-12"></div>;

                        const dateStr = `${currentYear}-${String(currentMonthNum + 1).padStart(2, '0')}-${String(dayNum).padStart(2, '0')}`;
                        const eventInfo = sessionDatesMap[dateStr];
                        const isEventDay = !!eventInfo;
                        
                        return (
                          <button 
                            key={`day-${dayNum}`}
                            onClick={() => isEventDay && handleDayClick(eventInfo.raceId)}
                            disabled={!isEventDay}
                            className={`relative flex flex-col items-center justify-center h-10 md:h-12 w-full rounded-lg transition-all 
                              ${isEventDay ? 'cursor-pointer hover:bg-zinc-800 hover:ring-1 hover:ring-zinc-600' : 'cursor-default opacity-50'}
                            `}
                          >
                            <span className={`text-sm md:text-base ${isEventDay ? 'font-bold text-white' : 'text-zinc-400'}`}>
                              {dayNum}
                            </span>
                            
                            {isEventDay && (
                              <div className="flex gap-1 mt-1">
                                {eventInfo.types.includes('practice') && <span className="w-1.5 h-1.5 rounded-full bg-blue-500 shadow-[0_0_5px_rgba(59,130,246,0.5)]"></span>}
                                {eventInfo.types.includes('qualy') && <span className="w-1.5 h-1.5 rounded-full bg-purple-500 shadow-[0_0_5px_rgba(168,85,247,0.5)]"></span>}
                                {eventInfo.types.includes('sprint') && <span className="w-1.5 h-1.5 rounded-full bg-orange-500 shadow-[0_0_5px_rgba(249,115,22,0.5)]"></span>}
                                {eventInfo.types.includes('race') && <span className="w-1.5 h-1.5 rounded-full bg-red-500 shadow-[0_0_5px_rgba(239,68,68,0.5)]"></span>}
                              </div>
                            )}
                          </button>
                        );
                      })}

                      <div className="flex items-center justify-center h-10 md:h-12 w-full border-l border-zinc-800/50 pl-1 md:pl-2">
                        {weekRace ? (
                          <button 
                            onClick={() => handleDayClick(weekRace.id)}
                            className="text-xl md:text-2xl drop-shadow-md hover:scale-110 transition-transform cursor-pointer" 
                            title={weekRace.country}
                          >
                            {weekRace.flag}
                          </button>
                        ) : (
                          <span className="w-4 border-b border-zinc-800/30"></span>
                        )}
                      </div>
                    </React.Fragment>
                  );
                })}
              </div>

              <div className="mt-6 pt-4 border-t border-zinc-800 flex flex-wrap justify-center gap-4 text-xs font-medium text-zinc-400">
                <span className="flex items-center gap-1.5"><span className="w-2 h-2 rounded-full bg-blue-500"></span> Libres</span>
                <span className="flex items-center gap-1.5"><span className="w-2 h-2 rounded-full bg-purple-500"></span> Qualy</span>
                <span className="flex items-center gap-1.5"><span className="w-2 h-2 rounded-full bg-orange-500"></span> Sprint</span>
                <span className="flex items-center gap-1.5"><span className="w-2 h-2 rounded-full bg-red-500"></span> Carrera</span>
              </div>
            </div>

            <div className="flex flex-col gap-4">
              {f1Calendar.map((race) => {
                const isExpanded = expandedRaceId === race.id;
                
                return (
                  <div 
                    key={race.id} 
                    id={race.id}
                    className={`group rounded-lg overflow-hidden transition-all duration-300 border bg-zinc-900 shadow-lg scroll-m-24
                      ${isExpanded ? 'ring-2 ring-red-600 border-red-600/50' : 'border-zinc-800 hover:border-zinc-600'}`}
                  >
                    <button 
                      onClick={() => toggleRace(race.id)}
                      className="w-full text-left p-4 md:p-5 flex items-center justify-between bg-zinc-900 hover:bg-zinc-800 transition-colors"
                    >
                      <div className="flex items-center gap-4 md:gap-6">
                        <div className="flex flex-col items-center justify-center min-w-[3.5rem]">
                          <span className="text-zinc-500 text-xs font-bold uppercase tracking-widest mb-1">Rnd</span>
                          <span className="text-2xl font-black text-white">{race.round}</span>
                        </div>
                        
                        <div className="h-12 w-px bg-zinc-800 hidden md:block"></div>

                        <div>
                          <div className="flex items-center gap-2 mb-1">
                            <span className="text-lg md:text-xl" title="Bandera">{race.flag}</span>
                            <h2 className="text-lg md:text-xl font-bold uppercase tracking-wide">{race.country}</h2>
                          </div>
                          <div className="flex items-center gap-3 text-zinc-400 text-xs md:text-sm">
                            <span className="flex items-center gap-1">
                              <Calendar size={12} className="text-red-500" />
                              {formatDate(race.startDate, race.endDate)}
                            </span>
                          </div>
                        </div>
                      </div>

                      <div className="flex items-center gap-4">
                        <div className="hidden md:flex flex-col items-end text-right mr-4">
                          <span className="text-sm font-medium text-zinc-300">{race.circuit}</span>
                        </div>
                        <div className={`p-2 rounded-full transition-colors ${isExpanded ? 'bg-red-600 text-white' : 'bg-zinc-800 text-zinc-400 group-hover:bg-zinc-700'}`}>
                          {isExpanded ? <ChevronUp size={20} /> : <ChevronDown size={20} />}
                        </div>
                      </div>
                    </button>

                    <div 
                      className={`grid transition-all duration-300 ease-in-out ${isExpanded ? 'grid-rows-[1fr] opacity-100' : 'grid-rows-[0fr] opacity-0'}`}
                    >
                      <div className="overflow-hidden bg-zinc-950 border-t border-zinc-800">
                        <div className="p-4 md:p-6">
                          <div className="w-full flex flex-col justify-center">
                            <h3 className="text-zinc-500 text-xs font-bold uppercase tracking-widest mb-3 flex items-center gap-2">
                              <Clock size={14} /> 
                              Horarios de Sesiones
                            </h3>
                            
                            <div className="space-y-2">
                              {race.sessions.map((session, idx) => {
                                const isMissing = session.time === '-';
                                const isRace = session.name.toLowerCase().includes('carrera');
                                
                                return (
                                  <div 
                                    key={idx} 
                                    className={`flex items-center justify-between p-3 rounded-md text-sm ${isRace && !isMissing ? 'bg-red-600/10 border border-red-600/30' : 'bg-zinc-900 border border-zinc-800'} ${isMissing ? 'opacity-50' : ''}`}
                                  >
                                    <div className="flex flex-col sm:flex-row sm:items-center gap-1 sm:gap-4">
                                      <span className={`font-bold w-36 uppercase ${isRace && !isMissing ? 'text-red-500' : 'text-zinc-300'}`}>
                                        {session.name}
                                      </span>
                                      <span className="text-zinc-500 text-xs sm:text-sm">{session.day}</span>
                                    </div>
                                    <div className="flex items-center gap-2">
                                      <span className="font-mono text-lg font-bold text-white tracking-wider">{session.time}</span>
                                      {isRace && !isMissing && <Trophy size={16} className="text-yellow-500 ml-1" />}
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>

                  </div>
                );
              })}
            </div>

            <div className="mt-8 flex items-start gap-3 text-zinc-400 text-sm bg-zinc-900/50 p-4 rounded-lg border border-zinc-800">
              <Info size={18} className="shrink-0 text-red-500 mt-0.5" />
              <p>
                Todos los horarios indicados están adaptados a la hora peninsular de España (CET). 
                Horarios y sesiones sujetos a cambios oficiales por parte de la FIA y retransmisión de DAZN.
              </p>
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
